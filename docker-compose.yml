version: "3.9"
services:
  boss-scraper:
    build: .
    env_file: .env
    environment:
      - HEADLESS=true
    volumes:
      - ./auth:/app/auth:ro      # 本地 login 后 scp 上传，只读挂载
      - ./data:/app/data          # 采集输出，读写
      - ./logs:/app/logs          # 日志目录
    command: ["scrape", "--max-pages", "3"]
    restart: "no"
